[workspace]
semver_check = false

# Bump signaling. release-plz defaults to patch when no Conventional Commit
# prefixes are present, which is what every source commit here looks like
# (short imperative subject + `[bl-xxxx]` trailer). To opt in to a non-patch
# bump, include `[minor]` or `[major]` as a standalone bracketed token in any
# commit's message that lands in the release window — preceded by start-of-
# string or whitespace, followed by end-of-string or whitespace. For non-
# conventional messages release-plz matches the regex against the full commit
# text, so the marker can sit in the subject (alongside `[bl-xxxx]`) or in
# the body. Prose mentions like `[minor]/[major]` (slash-joined, no boundary
# whitespace) do not match — keeps a commit describing the marker convention
# from self-bumping.
custom_minor_increment_regex = '(^|\s)\[minor\](\s|$)'
custom_major_increment_regex = '(^|\s)\[major\](\s|$)'

[changelog]
commit_parsers = [
    { message = "^balls:", skip = true },
    { message = ".*", group = "Changes" },
]
